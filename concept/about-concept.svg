  <!-- Label overlay -->
  <rect x="0" y="860" width="1280" height="40" fill="rgba(0,0,0,0.7)"/>
  <text x="640" y="885" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">CONCEPT ART — About Us Page  |  The Change Work  |  thechangework.com/about</text>
</svg>
