<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 900" width="1280" height="900" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="pageHeroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#0d2040"/>
    </linearGradient>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#112136"/>
    </linearGradient>
    <linearGradient id="portraitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="portraitGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0B7285"/>
      <stop offset="100%" stop-color="#0E8FA3"/>
    </linearGradient>
    <linearGradient id="ctaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#0d2040"/>
    </linearGradient>
  </defs>

  <!-- ── BROWSER CHROME ── -->
  <rect width="1280" height="900" rx="10" fill="#1e1e1e"/>
  <rect width="1280" height="36" rx="10 10 0 0" fill="#2c2c2c"/>
  <rect y="26" width="1280" height="10" fill="#2c2c2c"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <rect x="120" y="8" width="800" height="20" rx="4" fill="#3a3a3a"/>
  <text x="520" y="22" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#888" text-anchor="middle">thechangework.com/about</text>

  <!-- ── PAGE CONTENT starts at y=36 ── -->
  <g transform="translate(0,36)">

    <!-- NAV -->
    <rect width="1280" height="64" fill="url(#navyGrad)"/>
    <rect x="40" y="14" width="36" height="36" rx="7" fill="#0B7285"/>
    <text x="58" y="36" font-family="Georgia, serif" font-size="11" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">TCW</text>
    <text x="84" y="36" font-family="Georgia, serif" font-size="16" font-weight="700" fill="white">The Change Work</text>
    <text x="860" y="37" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.55)">Home</text>
    <text x="910" y="37" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="white">About Us</text>
    <!-- active underline -->
    <rect x="908" y="56" width="54" height="2.5" rx="1" fill="#0B7285"/>
    <text x="990" y="37" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.55)">Contact</text>
    <rect x="1074" y="18" width="120" height="28" rx="5" fill="#0B7285"/>
    <text x="1134" y="36" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">Schedule Now</text>

    <!-- PAGE HERO -->
    <rect y="64" width="1280" height="130" fill="url(#pageHeroGrad)"/>
    <text x="80" y="111" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="rgba(255,255,255,0.55)">OUR TEAM</text>
    <text x="80" y="146" font-family="Georgia, serif" font-size="34" font-weight="800" fill="white">Who We Are</text>
    <text x="80" y="170" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">Highly qualified change management professionals with decades of real-world experience.</text>

    <!-- ── DR. MARY BIO SECTION ── -->
    <rect y="194" width="1280" height="300" fill="white"/>

    <!-- Portrait card (left) -->
    <rect x="80" y="214" width="240" height="260" rx="16" fill="#F1F5F9"/>
    <circle cx="200" cy="304" r="52" fill="url(#portraitGrad)"/>
    <text x="200" y="311" font-family="Georgia, serif" font-size="15" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">DR. M</text>
    <text x="200" y="380" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#1E293B" text-anchor="middle">Dr. Mary Sanders</text>
    <text x="200" y="398" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Ph.D. | NLP Trainer</text>
    <text x="200" y="414" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">&amp; Master Practitioner</text>
    <text x="200" y="432" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Change Management Consultant</text>

    <!-- Bio text (right) -->
    <text x="360" y="232" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#0B7285">FOUNDER &amp; LEAD CONSULTANT</text>
    <text x="360" y="264" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#1E293B">Dr. Mary Sanders</text>
    <text x="360" y="292" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#475569">Dr. Mary enthusiastically shares a continuing expansive body of knowledge to</text>
    <text x="360" y="310" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#475569">meet the organizational needs from her work consulting with Fortune 500 companies</text>
    <text x="360" y="328" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#475569">— creating effective systems and cultures with innovative approaches.</text>
    <text x="360" y="356" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#475569">As a Neuro Linguistic Programming Trainer and Master Practitioner, she found</text>
    <text x="360" y="374" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#475569">significant effects of using two NLP methods to reduce resistance to change in</text>
    <text x="360" y="392" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#475569">large organizations during her Ph.D. research.</text>
    <text x="360" y="420" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#475569">She has facilitated thousands of workshops in many industries and in government.</text>

    <!-- ── MAKRINA SECTION ── -->
    <rect y="494" width="1280" height="240" fill="#F8FAFC"/>

    <!-- Text left -->
    <text x="80" y="528" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#0B7285">DATA SCIENCE &amp; AI</text>
    <text x="80" y="560" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#1E293B">Makrina Feagins</text>
    <!-- role tag -->
    <rect x="80" y="570" width="262" height="22" rx="11" fill="rgba(11,114,133,0.08)" stroke="rgba(11,114,133,0.2)" stroke-width="1"/>
    <text x="211" y="585" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#0B7285" text-anchor="middle">Data Science Consultant &amp; AI Strategist</text>
    <text x="80" y="614" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#475569">Makrina helps organizations turn the complexity of AI into measurable results.</text>
    <text x="80" y="632" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#475569">She partners with corporate leaders and educational institutions to design</text>
    <text x="80" y="650" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#475569">data-driven solutions that drive smarter decisions and prepare teams for AI.</text>
    <text x="80" y="676" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#475569">Currently pursuing a Ph.D. in Data Science at National University. 25+ years</text>
    <text x="80" y="694" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#475569">bridging technical expertise with classroom education.</text>

    <!-- Portrait card right -->
    <rect x="1000" y="508" width="200" height="210" rx="16" fill="#F1F5F9"/>
    <circle cx="1100" cy="580" r="44" fill="url(#portraitGrad2)"/>
    <text x="1100" y="587" font-family="Georgia, serif" font-size="15" font-weight="900" fill="white" text-anchor="middle">MF</text>
    <text x="1100" y="648" font-family="Georgia, serif" font-size="12" font-weight="700" fill="#1E293B" text-anchor="middle">Makrina Feagins</text>
    <text x="1100" y="664" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">AI Strategist</text>
    <text x="1100" y="680" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Ph.D. Candidate</text>
    <text x="1100" y="696" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">National University</text>

    <!-- CTA BAND -->
    <rect y="734" width="1280" height="130" fill="url(#ctaGrad)"/>
    <text x="200" y="786" font-family="Georgia, serif" font-size="26" font-weight="800" fill="white">Ready for Change?</text>
    <text x="200" y="814" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.65)">Schedule a consultation with Dr. Mary to discover how research-based strategies can drive your success.</text>
    <rect x="960" y="768" width="168" height="44" rx="6" fill="#D97706"/>
    <text x="1044" y="794" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Schedule Now</text>

